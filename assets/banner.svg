<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <style>
      @keyframes grain {
        0%   { transform: translate(0,0); }
        10%  { transform: translate(-2%,-3%); }
        20%  { transform: translate(3%,2%); }
        30%  { transform: translate(-1%,4%); }
        40%  { transform: translate(4%,-1%); }
        50%  { transform: translate(-3%,2%); }
        60%  { transform: translate(2%,-4%); }
        70%  { transform: translate(-4%,1%); }
        80%  { transform: translate(1%,3%); }
        90%  { transform: translate(3%,-2%); }
        100% { transform: translate(0,0); }
      }
      @keyframes fadeUp {
        from { opacity:0; transform:translateY(10px); }
        to   { opacity:1; transform:translateY(0); }
      }
      @keyframes pulse {
        0%,100% { filter:drop-shadow(0 0 4px #C9A84C66); }
        50%     { filter:drop-shadow(0 0 14px #C9A84C99); }
      }
      @keyframes drawLine {
        from { stroke-dashoffset: 300; }
        to   { stroke-dashoffset: 0; }
      }
      .grain-layer {
        animation: grain 0.35s steps(1) infinite;
      }
      .title {
        animation: fadeUp 1.2s ease 0.2s both, pulse 4s ease-in-out 1.5s infinite;
      }
      .sub {
        animation: fadeUp 1.2s ease 0.7s both;
      }
      .company {
        animation: fadeUp 1.2s ease 1.1s both;
      }
      .deco {
        animation: fadeUp 1.8s ease 0.4s both;
      }
      .line-left {
        stroke-dasharray: 300;
        animation: drawLine 1.2s ease 0.5s both;
      }
      .line-right {
        stroke-dasharray: 300;
        animation: drawLine 1.2s ease 0.7s both;
      }
    </style>

    <filter id="noise" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch" result="n">
        <animate attributeName="seed" from="0" to="999" dur="0.35s" repeatCount="indefinite"/>
      </feTurbulence>
      <feColorMatrix in="n" type="saturate" values="0" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="overlay"/>
    </filter>

    <filter id="glow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="b"/>
      <feFlood flood-color="#C9A84C" flood-opacity="0.45" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#111009"/>
      <stop offset="50%"  stop-color="#090807"/>
      <stop offset="100%" stop-color="#111009"/>
    </linearGradient>

    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#C9A84C" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="#C9A84C" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Film grain layer -->
  <rect class="grain-layer" x="-5%" y="-5%" width="110%" height="110%"
        fill="rgba(200,185,145,0.055)" filter="url(#noise)"/>

  <!-- Edge vignette -->
  <radialGradient id="vig" cx="50%" cy="50%" r="70%">
    <stop offset="60%"  stop-color="transparent"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="1200" height="300" fill="url(#vig)"/>

  <!-- Top + bottom hairlines -->
  <rect x="0" y="0"   width="1200" height="1" fill="url(#lg)" opacity="0.6"/>
  <rect x="0" y="299" width="1200" height="1" fill="url(#lg)" opacity="0.6"/>

  <!-- Horizontal accent lines with draw animation -->
  <line class="line-left"  x1="80"  y1="150" x2="380"  y2="150" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line class="line-right" x1="820" y1="150" x2="1120" y2="150" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>

  <!-- Diamond ornaments -->
  <g class="deco">
    <polygon points="72,150 79,143 86,150 79,157" fill="#C9A84C" opacity="0.65"/>
    <polygon points="1114,150 1121,143 1128,150 1121,157" fill="#C9A84C" opacity="0.65"/>
    <!-- small center dot -->
    <circle cx="600" cy="220" r="1.2" fill="#C9A84C" opacity="0.35"/>
  </g>

  <!-- Title -->
  <text class="title" x="600" y="128"
    text-anchor="middle" fill="#C9A84C"
    font-family="Georgia,'Times New Roman',serif"
    font-size="46" font-weight="bold" letter-spacing="3"
    filter="url(#glow)">Adam Muhammad</text>

  <!-- Tagline -->
  <text class="sub" x="600" y="168"
    text-anchor="middle" fill="#8b7355"
    font-family="Georgia,serif"
    font-size="12" letter-spacing="7">ENGINEER  ·  INTEGRATOR  ·  BUILDER</text>

  <!-- Company -->
  <text class="company" x="600" y="204"
    text-anchor="middle" fill="#3d3525"
    font-family="Georgia,serif"
    font-size="10" letter-spacing="2">PT Prima Tekindo Tirta Sejahtera  ·  ABB Value Partner  ·  Jakarta, Indonesia</text>
</svg>
