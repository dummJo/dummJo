<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <style>
      /* ── Cyberpunk 2077 keyframes ── */
      @keyframes glitchA {
        0%,88%,100% { transform:translate(0,0);    opacity:0; }
        90%          { transform:translate(-5px,0); opacity:0.75; }
        92%          { transform:translate(5px,0);  opacity:0.55; }
        94%          { transform:translate(-3px,0); opacity:0.35; }
        96%          { transform:translate(0,0);    opacity:0; }
      }
      @keyframes glitchB {
        0%,91%,100% { transform:translate(0,0);   opacity:0; }
        93%          { transform:translate(4px,0); opacity:0.6; }
        95%          { transform:translate(-4px,0);opacity:0.4; }
        97%          { transform:translate(0,0);   opacity:0; }
      }
      @keyframes flicker {
        0%,18%,20%,22%,52%,54%,64%,100% { opacity:1; }
        19%,21%,53%,55% { opacity:0.5; }
      }
      @keyframes scanMove {
        0%   { transform:translateY(-4px);   opacity:0.08; }
        50%  {                               opacity:0.14; }
        100% { transform:translateY(304px);  opacity:0.04; }
      }
      @keyframes drawLeft  { from { stroke-dashoffset:420; } to { stroke-dashoffset:0; } }
      @keyframes drawRight { from { stroke-dashoffset:420; } to { stroke-dashoffset:0; } }
      @keyframes bracketDraw {
        from { stroke-dashoffset:70; opacity:0; }
        to   { stroke-dashoffset:0;  opacity:1; }
      }
      @keyframes fadeUp {
        from { opacity:0; transform:translateY(8px); }
        to   { opacity:1; transform:translateY(0); }
      }
      @keyframes noise {
        0%  { transform:translate(0,0); }   10% { transform:translate(-1%,-2%); }
        20% { transform:translate(2%,1%); } 30% { transform:translate(-1%,3%); }
        40% { transform:translate(3%,-1%); }50% { transform:translate(-2%,2%); }
        60% { transform:translate(1%,-3%); }70% { transform:translate(-3%,1%); }
        80% { transform:translate(2%,2%); } 90% { transform:translate(1%,-1%); }
        100%{ transform:translate(0,0); }
      }
      @keyframes pulseY {
        0%,100% { filter:drop-shadow(0 0 8px #FCE205) drop-shadow(0 0 22px rgba(252,226,5,0.5)); }
        50%     { filter:drop-shadow(0 0 4px #FCE205) drop-shadow(0 0 12px rgba(252,226,5,0.25)); }
      }

      /* ── applied classes ── */
      .t-main  { animation: flicker 9s linear 1.4s infinite, pulseY 5s ease-in-out 2.5s infinite; }
      .t-ga    { animation: glitchA 9s linear 1.4s infinite; fill:#FF003C; }
      .t-gb    { animation: glitchB 9s linear 1.4s infinite; fill:#00F5FF; }
      .sub     { animation: fadeUp 1s ease 2s both; }
      .company { animation: fadeUp 1s ease 2.4s both; }
      .scan-bar{ animation: scanMove 4s linear infinite; }
      .noise-l { animation: noise 0.28s steps(1) infinite; }
      .ll { stroke-dasharray:420; animation: drawLeft  1.6s ease 0.8s both; }
      .lr { stroke-dasharray:420; animation: drawRight 1.6s ease 1.0s both; }
      .btl { stroke-dasharray:70; animation: bracketDraw 0.7s ease 0.2s both; }
      .btr { stroke-dasharray:70; animation: bracketDraw 0.7s ease 0.4s both; }
      .bbl { stroke-dasharray:70; animation: bracketDraw 0.7s ease 0.6s both; }
      .bbr { stroke-dasharray:70; animation: bracketDraw 0.7s ease 0.8s both; }
      .deco    { animation: fadeUp 1.4s ease 0.5s both; }
      .hud-txt { animation: fadeUp 1s ease 2.8s both; }
      .ticks   { animation: fadeUp 1s ease 1.8s both; }
    </style>

    <!-- ── Filters ── -->
    <filter id="glowY" x="-40%" y="-120%" width="180%" height="340%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7"  result="b1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="b2"/>
      <feFlood flood-color="#FCE205" flood-opacity="0.75" result="c1"/>
      <feFlood flood-color="#FCE205" flood-opacity="0.30" result="c2"/>
      <feComposite in="c1" in2="b1" operator="in" result="g1"/>
      <feComposite in="c2" in2="b2" operator="in" result="g2"/>
      <feMerge><feMergeNode in="g2"/><feMergeNode in="g1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowC" x="-40%" y="-120%" width="180%" height="340%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"  result="b1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="b2"/>
      <feFlood flood-color="#00F5FF" flood-opacity="0.70" result="c1"/>
      <feFlood flood-color="#00F5FF" flood-opacity="0.28" result="c2"/>
      <feComposite in="c1" in2="b1" operator="in" result="g1"/>
      <feComposite in="c2" in2="b2" operator="in" result="g2"/>
      <feMerge><feMergeNode in="g2"/><feMergeNode in="g1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="noise" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.88" numOctaves="4" stitchTiles="stitch" result="n">
        <animate attributeName="seed" from="0" to="999" dur="0.28s" repeatCount="indefinite"/>
      </feTurbulence>
      <feColorMatrix in="n" type="saturate" values="0" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="overlay"/>
    </filter>

    <!-- ── Gradients ── -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0b0d18"/>
      <stop offset="45%"  stop-color="#08090f"/>
      <stop offset="100%" stop-color="#0b0d18"/>
    </linearGradient>
    <radialGradient id="amb" cx="50%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#00F5FF" stop-opacity="0.045"/>
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="72%">
      <stop offset="52%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.72"/>
    </radialGradient>
    <linearGradient id="lgY" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FCE205" stop-opacity="0"/>
      <stop offset="38%"  stop-color="#FCE205" stop-opacity="0.55"/>
      <stop offset="62%"  stop-color="#FCE205" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FCE205" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lgC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00F5FF" stop-opacity="0"/>
      <stop offset="38%"  stop-color="#00F5FF" stop-opacity="0.35"/>
      <stop offset="62%"  stop-color="#00F5FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0"/>
    </linearGradient>

    <!-- ── Patterns ── -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="#00F5FF" stroke-width="0.3" opacity="0.10"/>
    </pattern>
    <pattern id="scanlines" x="0" y="0" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1200" height="2" fill="#000" opacity="0.18"/>
    </pattern>

    <!-- ── Clip paths for glitch slices ── -->
    <clipPath id="ca"><rect x="0" y="82"  width="1200" height="32"/></clipPath>
    <clipPath id="cb"><rect x="0" y="108" width="1200" height="28"/></clipPath>
  </defs>

  <!-- ── Background layers ── -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>
  <rect width="1200" height="300" fill="url(#amb)"/>
  <rect width="1200" height="300" fill="url(#vig)"/>
  <rect width="1200" height="300" fill="url(#scanlines)"/>

  <!-- Film grain -->
  <rect class="noise-l" x="-5%" y="-5%" width="110%" height="110%"
        fill="rgba(0,245,255,0.022)" filter="url(#noise)"/>

  <!-- Moving scan beam -->
  <rect class="scan-bar" x="0" y="0" width="1200" height="3" fill="#00F5FF"/>

  <!-- ── Hairlines ── -->
  <rect x="0" y="0"   width="1200" height="1"   fill="url(#lgY)" opacity="0.9"/>
  <rect x="0" y="299" width="1200" height="1"   fill="url(#lgY)" opacity="0.9"/>
  <rect x="0" y="2"   width="1200" height="0.5" fill="url(#lgC)" opacity="0.6"/>
  <rect x="0" y="297" width="1200" height="0.5" fill="url(#lgC)" opacity="0.6"/>

  <!-- ── Corner HUD brackets ── -->
  <polyline class="btl" points="52,22 22,22 22,52"
    fill="none" stroke="#FCE205" stroke-width="1.8"/>
  <polyline class="btr" points="1148,22 1178,22 1178,52"
    fill="none" stroke="#FCE205" stroke-width="1.8"/>
  <polyline class="bbl" points="52,278 22,278 22,248"
    fill="none" stroke="#FCE205" stroke-width="1.8"/>
  <polyline class="bbr" points="1148,278 1178,278 1178,248"
    fill="none" stroke="#FCE205" stroke-width="1.8"/>

  <!-- ── Horizontal accent lines ── -->
  <line class="ll" x1="58"  y1="150" x2="435"  y2="150"
        stroke="#00F5FF" stroke-width="0.9" opacity="0.55"/>
  <line class="lr" x1="765" y1="150" x2="1142" y2="150"
        stroke="#00F5FF" stroke-width="0.9" opacity="0.55"/>

  <!-- ── Tick marks on lines ── -->
  <g class="ticks" fill="none">
    <!-- Left side ticks -->
    <line x1="100"  y1="146" x2="100"  y2="154" stroke="#FCE205" stroke-width="1.2" opacity="0.9"/>
    <line x1="150"  y1="148" x2="150"  y2="152" stroke="#00F5FF" stroke-width="0.7" opacity="0.6"/>
    <line x1="210"  y1="148" x2="210"  y2="152" stroke="#00F5FF" stroke-width="0.7" opacity="0.6"/>
    <line x1="270"  y1="146" x2="270"  y2="154" stroke="#FCE205" stroke-width="1.0" opacity="0.75"/>
    <line x1="340"  y1="148" x2="340"  y2="152" stroke="#00F5FF" stroke-width="0.7" opacity="0.6"/>
    <line x1="400"  y1="146" x2="400"  y2="154" stroke="#FCE205" stroke-width="1.2" opacity="0.9"/>
    <!-- Right side ticks -->
    <line x1="800"  y1="146" x2="800"  y2="154" stroke="#FCE205" stroke-width="1.2" opacity="0.9"/>
    <line x1="860"  y1="148" x2="860"  y2="152" stroke="#00F5FF" stroke-width="0.7" opacity="0.6"/>
    <line x1="930"  y1="148" x2="930"  y2="152" stroke="#00F5FF" stroke-width="0.7" opacity="0.6"/>
    <line x1="990"  y1="146" x2="990"  y2="154" stroke="#FCE205" stroke-width="1.0" opacity="0.75"/>
    <line x1="1050" y1="148" x2="1050" y2="152" stroke="#00F5FF" stroke-width="0.7" opacity="0.6"/>
    <line x1="1100" y1="146" x2="1100" y2="154" stroke="#FCE205" stroke-width="1.2" opacity="0.9"/>
  </g>

  <!-- ── Diamond ornaments at line ends + center ── -->
  <g class="deco">
    <polygon points="50,150 58,142 66,150 58,158"
      fill="#FCE205" opacity="0.95" filter="url(#glowY)"/>
    <polygon points="1134,150 1142,142 1150,150 1142,158"
      fill="#FCE205" opacity="0.95" filter="url(#glowY)"/>
    <!-- centre pip -->
    <polygon points="596,139 600,135 604,139 600,143"
      fill="#00F5FF" opacity="0.8" filter="url(#glowC)"/>
  </g>

  <!-- ── Side vertical accent lines ── -->
  <g class="deco" opacity="0.35">
    <line x1="62" y1="75"  x2="62" y2="225"  stroke="#00F5FF" stroke-width="0.5"/>
    <line x1="1138" y1="75" x2="1138" y2="225" stroke="#00F5FF" stroke-width="0.5"/>
    <rect x="59" y="94"  width="6" height="6" fill="none" stroke="#FCE205" stroke-width="0.8"/>
    <rect x="59" y="200" width="6" height="6" fill="none" stroke="#FCE205" stroke-width="0.8"/>
    <rect x="1135" y="94"  width="6" height="6" fill="none" stroke="#FCE205" stroke-width="0.8"/>
    <rect x="1135" y="200" width="6" height="6" fill="none" stroke="#FCE205" stroke-width="0.8"/>
  </g>

  <!-- ── Glitch ghost layers (behind title) ── -->
  <text class="t-ga" x="597" y="130"
    text-anchor="middle"
    font-family="'Courier New',Courier,monospace"
    font-size="50" font-weight="bold" letter-spacing="5"
    clip-path="url(#ca)">ADAM MUHAMMAD</text>
  <text class="t-gb" x="603" y="130"
    text-anchor="middle"
    font-family="'Courier New',Courier,monospace"
    font-size="50" font-weight="bold" letter-spacing="5"
    clip-path="url(#cb)">ADAM MUHAMMAD</text>

  <!-- ── Main title ── -->
  <text class="t-main" x="600" y="130"
    text-anchor="middle" fill="#FCE205"
    font-family="'Courier New',Courier,monospace"
    font-size="50" font-weight="bold" letter-spacing="5"
    filter="url(#glowY)">ADAM MUHAMMAD</text>

  <!-- ── Tagline ── -->
  <text class="sub" x="600" y="174"
    text-anchor="middle" fill="#00F5FF"
    font-family="'Courier New',Courier,monospace"
    font-size="11" letter-spacing="8"
    filter="url(#glowC)">ENGINEER  ·  INTEGRATOR  ·  BUILDER</text>

  <!-- Micro divider dots -->
  <g class="company" opacity="0.55">
    <circle cx="576" cy="190" r="1.1" fill="#FCE205"/>
    <circle cx="600" cy="190" r="1.1" fill="#00F5FF"/>
    <circle cx="624" cy="190" r="1.1" fill="#FCE205"/>
  </g>

  <!-- ── Company line ── -->
  <text class="company" x="600" y="210"
    text-anchor="middle" fill="#2e4a55"
    font-family="'Courier New',Courier,monospace"
    font-size="9" letter-spacing="2">PT PRIMA TEKINDO TIRTA SEJAHTERA  ·  ABB VALUE PARTNER  ·  JAKARTA, INDONESIA</text>

  <!-- ── HUD decorative micro-text ── -->
  <g class="hud-txt" opacity="0.28"
     font-family="'Courier New',Courier,monospace" font-size="7"
     fill="#00F5FF" letter-spacing="1">
    <text x="30"  y="242">SYS.INIT</text>
    <text x="30"  y="252">VER.2077</text>
    <text x="1072" y="242">ID:0x2077</text>
    <text x="1072" y="252">STATUS:OK</text>
  </g>
</svg>
