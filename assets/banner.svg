<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <style>
      @keyframes grain {
        0%   { transform: translate(0,0); }
        10%  { transform: translate(-2%,-3%); }
        20%  { transform: translate(3%,2%); }
        30%  { transform: translate(-1%,4%); }
        40%  { transform: translate(4%,-1%); }
        50%  { transform: translate(-3%,2%); }
        60%  { transform: translate(2%,-4%); }
        70%  { transform: translate(-4%,1%); }
        80%  { transform: translate(1%,3%); }
        90%  { transform: translate(3%,-2%); }
        100% { transform: translate(0,0); }
      }
      @keyframes pulse {
        0%,100% { filter:drop-shadow(0 0 4px #C9A84C55); }
        50%     { filter:drop-shadow(0 0 18px #C9A84C99); }
      }
      @keyframes drawLine {
        from { stroke-dashoffset: 300; }
        to   { stroke-dashoffset: 0; }
      }
      .grain-layer { animation: grain 0.35s steps(1) infinite; }
      .title       { animation: pulse 4s ease-in-out infinite; }
      .line-left   { stroke-dasharray: 300; animation: drawLine 1.5s ease 0s both; }
      .line-right  { stroke-dasharray: 300; animation: drawLine 1.5s ease 0.2s both; }
    </style>
    <filter id="noise" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch" result="n">
        <animate attributeName="seed" from="0" to="999" dur="0.35s" repeatCount="indefinite"/>
      </feTurbulence>
      <feColorMatrix in="n" type="saturate" values="0" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="overlay"/>
    </filter>
    <filter id="glow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="b"/>
      <feFlood flood-color="#C9A84C" flood-opacity="0.45" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#111009"/>
      <stop offset="50%"  stop-color="#090807"/>
      <stop offset="100%" stop-color="#111009"/>
    </linearGradient>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#C9A84C" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="#C9A84C" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="60%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect class="grain-layer" x="-5%" y="-5%" width="110%" height="110%" fill="rgba(200,185,145,0.055)" filter="url(#noise)"/>
  <rect width="1200" height="280" fill="url(#vig)"/>
  <rect x="0" y="0"   width="1200" height="1" fill="url(#lg)" opacity="0.6"/>
  <rect x="0" y="279" width="1200" height="1" fill="url(#lg)" opacity="0.6"/>

  <line class="line-left"  x1="80"  y1="140" x2="370"  y2="140" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <line class="line-right" x1="830" y1="140" x2="1120" y2="140" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>

  <polygon points="72,140 80,132 88,140 80,148" fill="#C9A84C" opacity="0.6"/>
  <polygon points="1112,140 1120,132 1128,140 1120,148" fill="#C9A84C" opacity="0.6"/>

  <text class="title" x="600" y="122"
    text-anchor="middle" fill="#C9A84C"
    font-family="Georgia,'Times New Roman',serif"
    font-size="62" font-weight="bold" letter-spacing="4"
    filter="url(#glow)">Adam Muhammad</text>

  <text x="600" y="168"
    text-anchor="middle" fill="#9a8660"
    font-family="Georgia,serif"
    font-size="15" letter-spacing="7">ENGINEER  &#xB7;  INTEGRATOR  &#xB7;  BUILDER</text>
</svg>
